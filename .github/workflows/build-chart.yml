name: Build & Deploy Q3 Availability Chart

# ---------------------------------------------------------------------------
# WHEN IT RUNS:
#   - push to main : rebuilds & redeploys on every push to main (primary).
#   - workflow_dispatch : the "Run workflow" button, kept for manual reruns
#                         without needing a commit.
#   - schedule : commented out. Uncomment the cron if you later also want a
#                periodic auto-refresh independent of pushes.
# ---------------------------------------------------------------------------
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}           # manual trigger (convenience; optional)
  # schedule:
  #   - cron: "0 6 * * 1"         # every Monday 06:00 UTC

# Permissions required for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Avoid overlapping deploys.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build chart from USDA data
        env:
          # Optional Socrata app token (raises rate limits only — the dataset
          # is public). In the repo: Settings > Secrets and variables >
          # Actions > Repository secrets, named exactly SOCRATA_APP_TOKEN.
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
          # Live USDA AMS Socrata dataset acar-e3r8 (Refrigerated Truck Rates
          # and Availability). Set to "csv" to fall back to the committed CSV.
          DATA_SOURCE: "api"
          CSV_FALLBACK_PATH: "data/refrigerated_truck_rates_and_availability.csv"
        run: |
          python scripts/build_chart.py dist/Q3_Availability_Graph.html
          # Pages serves index.html by default — make the chart the landing page.
          cp dist/Q3_Availability_Graph.html dist/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
